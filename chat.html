<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaviTour - مساعد المواصلات</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:Arial,sans-serif; background:#0f172a; color:white; display:flex; flex-direction:column; height:100vh; }
  #header { background:#1e293b; padding:14px 16px; border-bottom:2px solid #3b82f6; display:flex; justify-content:space-between; align-items:center; }
  #header h2 { color:#60a5fa; font-size:16px; }
  #map-btn { background:#334155; color:#94a3b8; text-decoration:none; padding:6px 14px; border-radius:8px; font-size:13px; }
  #chat-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
  .bot  { background:#1e293b; border:1px solid #334155; align-self:flex-start; color:#e2e8f0; border-radius:4px 12px 12px 12px; }
  .user { background:#3b82f6; align-self:flex-end; color:white; border-radius:12px 4px 12px 12px; }
  #input-area { background:#1e293b; padding:12px 16px; display:flex; gap:8px; border-top:1px solid #334155; }
  #msg-input { flex:1; background:#0f172a; border:1px solid #334155; border-radius:8px; padding:10px 14px; color:white; font-size:15px; outline:none; font-family:Arial; }
  #msg-input:focus { border-color:#3b82f6; }
  #send-btn  { background:#3b82f6; color:white; border:none; border-radius:8px; padding:10px 18px; font-size:15px; cursor:pointer; }
  #reset-btn { background:#334155; color:#94a3b8; border:none; border-radius:8px; padding:10px 12px; cursor:pointer; font-size:15px; }
</style>
</head>
<body>
<div id="header">
  <h2>🚇 مساعد المواصلات</h2>
  <a href="/" id="map-btn">📍 الخريطة</a>
</div>
<div id="chat-area"></div>
<div id="input-area">
  <button id="reset-btn" title="محادثة جديدة">🔄</button>
  <input id="msg-input" type="text" placeholder="اكتب رسالتك…" autocomplete="off"/>
  <button id="send-btn">إرسال</button>
</div>
<script>
var chatArea = document.getElementById('chat-area');
var input    = document.getElementById('msg-input');
var sendBtn  = document.getElementById('send-btn');
var resetBtn = document.getElementById('reset-btn');

function addMsg(text, role) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function sendMessage() {
  var text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  sendBtn.disabled = true;
  fetch('/message', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message: text})
  })
  .then(r => r.json())
  .then(data => { addMsg(data.reply, 'bot'); sendBtn.disabled = false; input.focus(); })
  .catch(() => { addMsg('⚠️ حصل خطأ، جرب تاني.', 'bot'); sendBtn.disabled = false; });
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
resetBtn.addEventListener('click', () => {
  fetch('/reset', {method:'POST'}).then(() => { chatArea.innerHTML=''; startChat(); });
});

function startChat() {
  fetch('/message', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:''})})
  .then(r => r.json()).then(data => addMsg(data.reply, 'bot'));
}
startChat();
</script>
</body>
</html>
